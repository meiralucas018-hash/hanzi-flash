<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>汉字 Flash</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="汉字 Flash" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0c;
      color: #f1f5f9;
      font-family: 'Segoe UI', 'PingFang SC', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    .wrapper {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(18px, 4vw, 40px) 16px clamp(32px, 6vw, 60px);
      background-attachment: fixed;
      background-image:
        radial-gradient(1200px 700px at 30% 10%, rgba(96,165,250,.10), transparent 60%),
        radial-gradient(900px 600px at 80% 20%, rgba(192,132,252,.08), transparent 55%),
        linear-gradient(#0a0a0c, #0a0a0c);
    }

    .card-box {
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 30%), #16161a;
      max-width: 760px;
      width: 100%;
      border-radius: 22px;
      padding: clamp(20px, 4.2vw, 42px);
      box-shadow: 0 25px 55px -14px rgba(0,0,0,.75);
      border: 1px solid rgba(255,255,255,.06);
      position: relative;
      overflow: hidden;
    }

    .card-box::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background:
        radial-gradient(450px 220px at 20% 0%, rgba(96,165,250,.18), transparent 60%),
        radial-gradient(420px 240px at 85% 10%, rgba(192,132,252,.14), transparent 60%);
      pointer-events: none;
      opacity: .55;
      filter: blur(10px);
    }

    .card-box > * { position: relative; }

    /* ── HOME ── */
    .home-title {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 900;
      color: rgba(96,165,250,.92);
      text-align: center;
      margin-bottom: 4px;
      text-shadow: 0 0 24px rgba(96,165,250,.3), 0 18px 45px rgba(0,0,0,.55);
      letter-spacing: -1px;
    }

    .home-subtitle {
      color: #94a3b8;
      text-align: center;
      font-size: 0.95em;
      margin-bottom: 36px;
      letter-spacing: .5px;
    }

    .streak-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(251,191,36,.07);
      border: 1px solid rgba(251,191,36,.2);
      border-radius: 12px;
      padding: 10px 18px;
      margin-bottom: 20px;
      font-size: .9em;
      color: #fbbf24;
      font-weight: 600;
    }

    .streak-banner .streak-num {
      font-size: 1.5em;
      font-weight: 900;
      line-height: 1;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 14px 20px;
      text-align: center;
      min-width: 90px;
      flex: 1;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: rgba(96,165,250,.9);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7em;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 4px;
    }

    .home-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: block;
      width: 100%;
      padding: 15px 24px;
      border-radius: 14px;
      border: none;
      font-family: inherit;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s ease;
      letter-spacing: .3px;
    }

    .btn-primary {
      background: rgba(96,165,250,.15);
      border: 1px solid rgba(96,165,250,.35);
      color: #60a5fa;
    }
    .btn-primary:hover { background: rgba(96,165,250,.25); transform: translateY(-1px); }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      color: #94a3b8;
    }
    .btn-secondary:hover { background: rgba(255,255,255,.08); transform: translateY(-1px); }

    .btn-show {
      background: rgba(192,132,252,.12);
      border: 1px solid rgba(192,132,252,.3);
      color: #c084fc;
      margin-top: 20px;
    }
    .btn-show:hover { background: rgba(192,132,252,.22); transform: translateY(-1px); }

    .btn-hint {
      display: block;
      width: 100%;
      padding: 9px 16px;
      border-radius: 10px;
      border: 1px dashed rgba(96,165,250,.22);
      background: transparent;
      color: rgba(96,165,250,.5);
      font-family: inherit;
      font-size: .82em;
      cursor: pointer;
      margin-top: 10px;
      transition: all .18s;
      letter-spacing: .3px;
    }
    .btn-hint:hover { border-color: rgba(96,165,250,.5); color: rgba(96,165,250,.85); }

    /* ── KEYBOARD HINT ── */
    .kbd-hint {
      text-align: center;
      color: #334155;
      font-size: .73em;
      margin-top: 14px;
      letter-spacing: .4px;
    }
    .kbd {
      display: inline-block;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 5px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 1em;
    }

    /* ── PROGRESS ── */
    .progress-bar-wrap {
      width: 100%;
      max-width: 760px;
      height: 3px;
      background: rgba(255,255,255,.05);
      border-radius: 99px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #c084fc);
      border-radius: 99px;
      transition: width .4s ease;
    }

    /* ── FRONT ── */
    .char-display {
      text-align: center;
      margin-bottom: 22px;
    }

    .hanzi {
      font-size: clamp(3.1rem, 7.5vw, 4.6rem);
      font-weight: 900;
      color: rgba(96,165,250,.92);
      text-shadow: 0 0 18px rgba(96,165,250,.22), 0 18px 45px rgba(0,0,0,.55);
      line-height: 1.05;
    }

    .pinyin {
      margin-top: 6px;
      color: #94a3b8;
      font-size: 1.05rem;
      letter-spacing: .4px;
      min-height: 1.6em;
      transition: opacity .25s ease;
    }
    .pinyin.hidden { opacity: 0; }

    .card-counter {
      position: absolute;
      top: 18px;
      right: 22px;
      font-size: .72em;
      color: #475569;
      font-weight: 600;
      letter-spacing: .4px;
    }

    .canvas-wrapper {
      position: relative;
      width: min(420px, 92vw);
      height: min(420px, 92vw);
      margin: 0 auto;
    }

    .canvas-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
      background-size: 50% 50%;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,0.15);
      box-sizing: border-box;
    }

    .canvas-grid::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(135deg, transparent 49%, rgba(255,255,255,0.05) 50%, transparent 51%),
        linear-gradient(45deg,  transparent 49%, rgba(255,255,255,0.05) 50%, transparent 51%);
      border-radius: 14px;
    }

    #drawingCanvas {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      border-radius: 14px;
      box-shadow: inset 0 3px 15px rgba(0,0,0,0.6);
      cursor: crosshair;
      touch-action: none;
      display: block;
    }

    .btn-row {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .draw-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      color: #f1f5f9;
      padding: 8px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: .9em;
      transition: all .2s ease;
    }

    .draw-btn:hover {
      background: rgba(96,165,250,0.15);
      border-color: rgba(96,165,250,0.4);
    }

    /* ── RATING ── */
    .rating-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .rating-btn {
      padding: 13px 6px;
      border-radius: 12px;
      border: 1px solid;
      font-family: inherit;
      font-size: 0.85em;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s ease;
      text-align: center;
      line-height: 1.3;
    }

    .rating-btn .ivl {
      display: block;
      font-size: 0.72em;
      font-weight: 400;
      opacity: 0.65;
      margin-top: 2px;
    }

    .btn-again { background: rgba(239,68,68,.10);  border-color: rgba(239,68,68,.3);  color: #f87171; }
    .btn-hard  { background: rgba(251,146,60,.10); border-color: rgba(251,146,60,.3); color: #fb923c; }
    .btn-good  { background: rgba(96,165,250,.10); border-color: rgba(96,165,250,.3); color: #60a5fa; }
    .btn-easy  { background: rgba(52,211,153,.10); border-color: rgba(52,211,153,.3); color: #34d399; }

    .btn-again:hover { background: rgba(239,68,68,.2);  transform: translateY(-1px); }
    .btn-hard:hover  { background: rgba(251,146,60,.2); transform: translateY(-1px); }
    .btn-good:hover  { background: rgba(96,165,250,.2); transform: translateY(-1px); }
    .btn-easy:hover  { background: rgba(52,211,153,.2); transform: translateY(-1px); }

    /* ── MEANING MAP ── */
    .meaning-map .mm-header { text-align: center; margin-bottom: clamp(16px,3vw,24px); }

    .meaning-map .char-main {
      font-size: clamp(3.2rem, 8vw, 4.8rem);
      font-weight: 900;
      color: rgba(96,165,250,.88);
      text-shadow: 0 0 18px rgba(96,165,250,.22), 0 18px 45px rgba(0,0,0,.55);
      cursor: pointer;
      display: inline-block;
      transition: transform .2s, color .2s;
    }
    .meaning-map .char-main:hover { transform: scale(1.05); color: #fff; }

    .meaning-map .subhead { color: #94a3b8; font-size: 0.9em; margin-top: 6px; letter-spacing: .4px; }

    .meaning-map .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      margin: 0 0 clamp(18px,3vw,28px) 0;
    }

    .meaning-map .meaning-item {
      position: relative;
      margin-bottom: clamp(20px,3.5vw,36px);
      padding: 0 0 0 18px;
      border-left: 3px solid rgba(255,255,255,.07);
    }

    .meaning-map .label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.78em;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 1.6px;
      color: #c084fc;
      margin: 0 0 12px 0;
    }

    .meaning-map .label::before {
      content: "";
      width: 10px; height: 10px;
      border-radius: 99px;
      background: rgba(192,132,252,.8);
      box-shadow: 0 0 0 4px rgba(192,132,252,.15);
      flex-shrink: 0;
    }

    .meaning-map .sentence-wrap {
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: border-color .18s, transform .18s, background .18s;
    }

    .meaning-map .sentence-wrap:hover {
      border-color: rgba(96,165,250,.35);
      background: rgba(255,255,255,.025);
      transform: translateY(-1px);
    }

    .meaning-map .sentence-box {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      line-height: 1.8;
      color: #f1f5f9;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .meaning-map .word {
      position: relative;
      display: inline-block;
      border-bottom: 5px dashed #3f444d;
      margin-bottom: 8px;
      padding: 0 3px 5px 3px;
      cursor: pointer;
      transition: border-color .2s;
    }
    .meaning-map .word:hover { border-bottom-color: #c084fc; }

    .meaning-map .char {
      position: relative;
      display: inline;
      cursor: pointer;
      border-radius: 4px;
      transition: color .1s, background .12s;
    }
    .meaning-map .char:hover { color: #60a5fa; background: rgba(96,165,250,.14); }

    .meaning-map .char::after,
    .meaning-map .word::after {
      position: absolute;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 0.46em;
      font-weight: 650;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      z-index: 99999;
      pointer-events: none;
      transition: opacity .12s, transform .12s;
      max-width: min(78vw, 520px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meaning-map .char::after {
      content: attr(data-m);
      bottom: 100%;
      margin-bottom: 18px;
      background: #2d2d35;
      color: #60a5fa;
      border: 1px solid rgba(96,165,250,.75);
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    }

    .meaning-map .word::after {
      content: attr(data-m);
      bottom: 100%;
      margin-bottom: 18px;
      background: rgba(192,132,252,.95);
      color: #000;
      border: 1px solid rgba(192,132,252,.35);
      box-shadow: 0 12px 24px rgba(0,0,0,.28);
    }

    .meaning-map .char:hover::after,
    .meaning-map .word:hover::after {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(-16px);
    }

    .meaning-map .word.suppress-word-tooltip::after {
      visibility: hidden !important;
      opacity: 0 !important;
    }

    .meaning-map .pinyin-line {
      color: rgba(96,165,250,.95);
      font-size: 1em;
      margin-top: 10px;
      line-height: 1.55;
    }

    .meaning-map .py { display: inline-block; white-space: nowrap; }

    .meaning-map .translation-line {
      color: #94a3b8;
      font-style: italic;
      font-size: 0.95em;
      margin-top: 2px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(18px);
      background: rgba(22,22,26,.92);
      border: 1px solid rgba(255,255,255,.10);
      color: #f1f5f9;
      padding: 10px 18px;
      border-radius: 999px;
      box-shadow: 0 18px 40px rgba(0,0,0,.45);
      font-size: .95em;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s, transform .18s;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── DONE SCREEN ── */
    .done-emoji { font-size: 4rem; text-align: center; margin-bottom: 16px; }
    .done-title { font-size: 1.8rem; font-weight: 800; color: rgba(96,165,250,.9); text-align: center; margin-bottom: 8px; }
    .done-sub   { color: #94a3b8; text-align: center; font-size: 0.95em; margin-bottom: 28px; line-height: 1.6; }

    .session-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 28px;
    }

    .session-stat {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }

    .session-stat .s-num {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
    }

    .session-stat .s-label {
      font-size: .65em;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      margin-top: 4px;
    }

    .s-green { color: #34d399; }
    .s-blue  { color: #60a5fa; }
    .s-amber { color: #fbbf24; }

    /* ── BROWSE ── */
    .browse-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .browse-back {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 10px;
      color: #94a3b8;
      padding: 7px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: .9em;
      transition: all .2s;
    }
    .browse-back:hover { background: rgba(255,255,255,.1); color: #f1f5f9; }

    .browse-title {
      font-size: 1.1em;
      font-weight: 700;
      color: #f1f5f9;
    }

    .browse-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
    }

    .browse-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 16px 8px;
      text-align: center;
      cursor: pointer;
      transition: all .18s ease;
    }

    .browse-card:hover {
      background: rgba(96,165,250,.1);
      border-color: rgba(96,165,250,.3);
      transform: translateY(-2px);
    }

    .browse-card .bc-hanzi {
      font-size: 2rem;
      font-weight: 900;
      color: rgba(96,165,250,.88);
      line-height: 1;
    }

    .browse-card .bc-pinyin {
      font-size: .7em;
      color: #64748b;
      margin-top: 5px;
    }

    .browse-card .bc-badge {
      width: 8px; height: 8px;
      border-radius: 99px;
      margin: 6px auto 0;
    }

    .badge-new    { background: #60a5fa; }
    .badge-due    { background: #fb923c; }
    .badge-learned{ background: #34d399; }

    @media (max-width: 420px) {
      .rating-btn { font-size: 0.78em; padding: 11px 4px; }
      .meaning-map .char::after, .meaning-map .word::after { max-width: min(88vw,420px); font-size: .50em; }
      .session-stats { grid-template-columns: repeat(3,1fr); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- ══════════════ HOME ══════════════ -->
  <div id="screen-home" class="screen active">
    <div class="wrapper">
      <div class="card-box" style="max-width:480px;">
        <div class="home-title">汉字</div>
        <div class="home-subtitle">Spaced Repetition Flashcards</div>
        <div class="streak-banner" id="streak-banner">
          <span>🔥</span>
          <span class="streak-num" id="streak-num">0</span>
          <span>day streak</span>
        </div>
        <div class="stats-row">
          <div class="stat-pill">
            <div class="stat-num" id="stat-due">0</div>
            <div class="stat-label">Due Today</div>
          </div>
          <div class="stat-pill">
            <div class="stat-num" id="stat-total">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-pill">
            <div class="stat-num" id="stat-learned">0</div>
            <div class="stat-label">Learned</div>
          </div>
        </div>
        <div class="home-actions">
          <button class="btn btn-primary" id="btn-start">Start Review →</button>
          <button class="btn btn-secondary" id="btn-browse">Browse All Cards</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ FRONT ══════════════ -->
  <div id="screen-front" class="screen">
    <div class="wrapper">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="card-box">
        <div class="card-counter" id="card-counter"></div>
        <div class="char-display">
          <div class="hanzi" id="front-hanzi"></div>
          <div class="pinyin hidden" id="front-pinyin"></div>
        </div>
        <div class="canvas-wrapper">
          <canvas id="drawingCanvas" width="420" height="420"></canvas>
          <div class="canvas-grid"></div>
        </div>
        <div class="btn-row">
          <button id="undoDrawBtn" class="draw-btn"
            style="background:rgba(96,165,250,0.08);border-color:rgba(96,165,250,0.25);">Undo</button>
          <button id="clearDrawBtn" class="draw-btn"
            style="background:rgba(255,60,60,0.1);border-color:rgba(255,60,60,0.2);">Clear</button>
        </div>
        <button class="btn-hint" id="btn-pinyin-hint">Show Pinyin</button>
        <button class="btn btn-show" id="btn-show-answer">Show Answer <span style="opacity:.5;font-weight:400;font-size:.85em">Space</span></button>
        <div class="kbd-hint">Rate: <span class="kbd">1</span> Again &nbsp; <span class="kbd">2</span> Hard &nbsp; <span class="kbd">3</span> Good &nbsp; <span class="kbd">4</span> Easy</div>
      </div>

  // ════════════════════════════════════════════════════════════════
  //  SM-2 SCHEDULER
  // ════════════════════════════════════════════════════════════════
  const STORE_KEY   = 'hanzi_flash_v1';
  const STREAK_KEY  = 'hanzi_flash_streak_v1';

  function loadState()      { try { return JSON.parse(localStorage.getItem(STORE_KEY))  || {}; } catch(e) { return {}; } }
  function saveState(s)     { localStorage.setItem(STORE_KEY,  JSON.stringify(s)); }
  function loadStreak()     { try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { count: 0, lastDay: null }; } catch(e) { return { count: 0, lastDay: null }; } }
  function saveStreak(s)    { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }
  function getCS(state, id) { return state[id] || { interval: 0, ease: 2.5, reps: 0, due: 0 }; }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }

  function updateStreak(completed) {
    const s = loadStreak();
    const today = todayStr();
    if (s.lastDay === today) return s;
    const yesterday = (() => { const d = new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; })();
    if (completed) {
      s.count = (s.lastDay === yesterday) ? s.count + 1 : 1;
      s.lastDay = today;
    }
    saveStreak(s);
    return s;
  }

  function sm2(cs, rating) {
    let { interval, ease, reps } = cs;
    if (rating === 0) {
      interval = 1; reps = 0;
    } else {
      if      (reps === 0) interval = 1;
      else if (reps === 1) interval = 6;
      else                 interval = Math.round(interval * ease);
      reps++;
      ease = Math.max(1.3, ease + [-0.15, -0.08, 0, 0.15][rating]);
      if (rating === 1) interval = Math.max(1, Math.round(interval * 0.5));
      if (rating === 3) interval = Math.round(interval * 1.3);
    }
    return { interval, ease, reps, due: Date.now() + interval * 86400000 };
  }

  function fmtInterval(cs, rating) {
    const d = sm2({ ...cs }, rating).interval;
    if (d < 1)   return '<1d';
    if (d < 30)  return d + 'd';
    if (d < 365) return Math.round(d/30) + 'mo';
    return Math.round(d/365) + 'yr';
  }

  function getDue(state) {
    const now = Date.now();
    return CARDS.filter(c => getCS(state, c.id).due <= now);
  }

  // ════════════════════════════════════════════════════════════════
  //  APP STATE
  // ════════════════════════════════════════════════════════════════
  let appState = loadState();
  let queue    = [];
  let qIdx     = 0;
  let curCard  = null;

  // Session tracking
  let sessTotal  = 0;
  let sessGood   = 0; // rating >= 2

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    // Scroll to top on each screen change
    window.scrollTo(0, 0);
  }

  // ── HOME ──
  function renderHome() {
    appState = loadState();
    const due = getDue(appState).length;
    document.getElementById('stat-due').textContent     = due;
    document.getElementById('stat-total').textContent   = CARDS.length;
    document.getElementById('stat-learned').textContent = CARDS.filter(c => getCS(appState, c.id).reps > 0).length;

    // Streak
    const streak = loadStreak();
    document.getElementById('streak-num').textContent = streak.count;
    document.getElementById('streak-banner').style.opacity = streak.count > 0 ? '1' : '0.4';

    // Disable start if nothing due
    const startBtn = document.getElementById('btn-start');
    startBtn.disabled = due === 0;
    startBtn.textContent = due > 0 ? `Start Review (${due} cards) →` : 'All Caught Up ✓';

    showScreen('screen-home');
  }

  document.getElementById('btn-start').addEventListener('click', () => {
    appState = loadState();
    queue = getDue(appState);
    if (!queue.length) { showDone(); return; }
    // shuffle queue
    for (let i = queue.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [queue[i], queue[j]] = [queue[j], queue[i]];
    }
    qIdx = 0;
    sessTotal = 0;
    sessGood  = 0;
    showFront();
  });

  document.getElementById('btn-home').addEventListener('click', renderHome);

  // ── BROWSE ──
  document.getElementById('btn-browse').addEventListener('click', () => {
    appState = loadState();
    const grid = document.getElementById('browse-grid');
    grid.innerHTML = '';
    CARDS.forEach(c => {
      const cs = getCS(appState, c.id);
      const isNew    = cs.reps === 0;
      const isDue    = !isNew && cs.due <= Date.now();
      const badgeClass = isNew ? 'badge-new' : isDue ? 'badge-due' : 'badge-learned';
      const div = document.createElement('div');
      div.className = 'browse-card';
      div.innerHTML = `
        <div class="bc-hanzi">${c.hanzi}</div>
        <div class="bc-pinyin">${c.pinyin}</div>
        <div class="bc-badge ${badgeClass}"></div>
      `;
      grid.appendChild(div);
    });
    showScreen('screen-browse');
  });

  document.getElementById('btn-browse-back').addEventListener('click', renderHome);

  // ── FRONT ──
  function updateProgress() {
    const pct = queue.length ? (qIdx / queue.length) * 100 : 0;
    document.getElementById('progress-fill').style.width      = pct + '%';
    document.getElementById('progress-fill-back').style.width = pct + '%';
    const label = `${qIdx + 1} / ${queue.length}`;
    document.getElementById('card-counter').textContent      = label;
    document.getElementById('card-counter-back').textContent = label;
  }

  function showFront() {
    curCard = queue[qIdx];
    document.getElementById('front-hanzi').textContent  = curCard.hanzi;
    const pinyinEl = document.getElementById('front-pinyin');
    pinyinEl.textContent = curCard.pinyin;
    pinyinEl.classList.add('hidden');
    document.getElementById('btn-pinyin-hint').textContent = 'Show Pinyin';
    updateProgress();
    doClearCanvas();
    showScreen('screen-front');
  }

  document.getElementById('btn-pinyin-hint').addEventListener('click', () => {
    const el = document.getElementById('front-pinyin');
    const btn = document.getElementById('btn-pinyin-hint');
    if (el.classList.contains('hidden')) {
      el.classList.remove('hidden');
      btn.textContent = 'Hide Pinyin';
    } else {
      el.classList.add('hidden');
      btn.textContent = 'Show Pinyin';
    }
  });

  document.getElementById('btn-show-answer').addEventListener('click', showBack);

  // ── BACK ──
  function showBack() {
    document.getElementById('meaning-map-content').innerHTML = curCard.backHTML;
    const cs = getCS(appState, curCard.id);
    ['again','hard','good','easy'].forEach((n,i) => {
      document.getElementById('ivl-' + n).textContent = fmtInterval(cs, i);
    });
    updateProgress();
    showScreen('screen-back');
    wireBackInteractions();
  }

  document.querySelectorAll('.rating-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const rating = parseInt(btn.dataset.rating);
      appState[curCard.id] = sm2(getCS(appState, curCard.id), rating);
      saveState(appState);
      sessTotal++;
      if (rating >= 2) sessGood++;
      qIdx++;
      qIdx >= queue.length ? showDone() : showFront();
    });
  });

  // ── DONE ──
  function showDone() {
    const pct = sessTotal > 0 ? Math.round((sessGood / sessTotal) * 100) : 0;
    document.getElementById('sess-total').textContent = sessTotal;
    document.getElementById('sess-good').textContent  = sessGood;
    document.getElementById('sess-pct').textContent   = pct + '%';

    if (sessTotal === 0) {
      document.getElementById('done-emoji').textContent = '✅';
      document.getElementById('done-title').textContent = 'All Caught Up!';
      document.getElementById('done-sub').textContent   = 'No cards due right now. Come back tomorrow!';
    } else {
      const emoji = pct >= 90 ? '🌟' : pct >= 70 ? '🎉' : pct >= 50 ? '💪' : '📚';
      document.getElementById('done-emoji').textContent = emoji;
      document.getElementById('done-title').textContent = 'Session Complete!';
      document.getElementById('done-sub').textContent   = pct >= 70
        ? 'Great work! Keep up the streak.'
        : 'Keep practicing — you\'ll get there!';
      updateStreak(true);
    }
    showScreen('screen-done');
  }

  // ── KEYBOARD SHORTCUTS ──
  document.addEventListener('keydown', e => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    const active = document.querySelector('.screen.active')?.id;

    if (active === 'screen-front') {
      if (e.code === 'Space') { e.preventDefault(); showBack(); }
      if (e.key === 'p' || e.key === 'P') {
        const el = document.getElementById('front-pinyin');
        const btn = document.getElementById('btn-pinyin-hint');
        el.classList.toggle('hidden');
        btn.textContent = el.classList.contains('hidden') ? 'Show Pinyin' : 'Hide Pinyin';
      }
    }

    if (active === 'screen-back') {
      const map = { '1': 0, '2': 1, '3': 2, '4': 3 };
      if (map[e.key] !== undefined) {
        const rating = map[e.key];
        appState[curCard.id] = sm2(getCS(appState, curCard.id), rating);
        saveState(appState);
        sessTotal++;
        if (rating >= 2) sessGood++;
        qIdx++;
        qIdx >= queue.length ? showDone() : showFront();
      }
    }
  });

  // ── TOAST & COPY ──
  const toastEl = document.getElementById('toast');
  let toastTimer = null;

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1400);
  }

  async function copyText(text) {
    try { if (navigator.clipboard?.writeText) { await navigator.clipboard.writeText(text); return true; } } catch(e) {}
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px;top:0';
      document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy'); document.body.removeChild(ta); return ok;
    } catch(e) { return false; }
  }

  function wireBackInteractions() {
    const map = document.getElementById('meaning-map-content');

    map.querySelector('.char-main')?.addEventListener('click', async e => {
      e.stopPropagation();
      const txt = e.currentTarget.textContent.trim();
      showToast((await copyText(txt)) ? 'Copied: ' + txt : 'Copy failed');
    });

    map.querySelectorAll('.char').forEach(ch => {
      ch.addEventListener('click', async e => {
        e.stopPropagation();
        const txt = ch.textContent.trim();
        showToast((await copyText(txt)) ? 'Copied: ' + txt : 'Copy failed');
      });
    });

    map.querySelectorAll('.word').forEach(w => {
      w.addEventListener('click', async e => {
        if (e.target.closest('.char')) return;
        e.stopPropagation();
        const txt = w.textContent.replace(/\s+/g,'').trim();
        showToast((await copyText(txt)) ? 'Copied: ' + txt : 'Copy failed');
      });
    });

    map.querySelectorAll('.sentence-wrap[data-clickcopy]').forEach(wrap => {
      wrap.addEventListener('click', async e => {
        if (e.target.closest('.word') || e.target.closest('.char')) return;
        const txt = wrap.dataset.copy || '';
        showToast((await copyText(txt)) ? 'Copied: ' + txt : 'Copy failed');

    map.querySelectorAll('.word .char').forEach(ch => {

      ch.addEventListener('mouseleave', removeSuppress);
      ch.addEventListener('touchstart', () => { addSuppress(); setTimeout(removeSuppress, 800); }, { passive: true });
    });

  // ════════════════════════════════════════════════════════════════
  //  DRAWING PAD
  // ════════════════════════════════════════════════════════════════
  (function initDrawPad() {
    const canvas   = document.getElementById('drawingCanvas');
    const clearBtn = document.getElementById('clearDrawBtn');
    const undoBtn  = document.getElementById('undoDrawBtn');
    const ctx      = canvas.getContext('2d');
    let isDrawing  = false;
    let rawPoints  = [];
    let undoStack  = [ctx.getImageData(0, 0, canvas.width, canvas.height)];

    function applyStyle() {
      ctx.lineWidth = 14; ctx.lineCap = 'square'; ctx.lineJoin = 'miter'; ctx.miterLimit = 10;
      ctx.strokeStyle = '#4d90d6'; ctx.shadowColor = 'rgba(60,120,210,0.45)'; ctx.shadowBlur = 8;
    }
    applyStyle();

    function getCoords(e) {
      const r = canvas.getBoundingClientRect();
      const sx = canvas.width / r.width, sy = canvas.height / r.height;
      const s = e.touches?.length ? e.touches[0] : e;
      return { x: (s.clientX - r.left) * sx, y: (s.clientY - r.top) * sy };
    }

    const restore = snap => ctx.putImageData(snap, 0, 0);
    const snap    = ()   => ctx.getImageData(0, 0, canvas.width, canvas.height);

    function chaikin(pts, passes) {
      let r = pts;
      for (let p = 0; p < (passes||3); p++) {
        const n = [r[0]];
        for (let i = 0; i < r.length-1; i++) {
          const a = r[i], b = r[i+1];
          n.push({ x:.75*a.x+.25*b.x, y:.75*a.y+.25*b.y });
          n.push({ x:.25*a.x+.75*b.x, y:.25*a.y+.75*b.y });
        }
        n.push(r[r.length-1]); r = n;
      }
      return r;
    }

    function catmullSeg(p0,p1,p2,p3) {
      ctx.bezierCurveTo(
        p1.x+(p2.x-p0.x)/3, p1.y+(p2.y-p0.y)/3,
        p2.x-(p3.x-p1.x)/3, p2.y-(p3.y-p1.y)/3,
        p2.x, p2.y
      );
    }

    function drawLivePreview(pts) {
      if (pts.length < 2) return;
      const s = chaikin(pts,3);
      const g0 = {x:2*s[0].x-s[1].x, y:2*s[0].y-s[1].y};
      const gN = {x:2*s[s.length-1].x-s[s.length-2].x, y:2*s[s.length-1].y-s[s.length-2].y};
      const all = [g0,...s,gN];
      ctx.beginPath(); ctx.moveTo(all[1].x, all[1].y);
      if (all.length<=3) ctx.lineTo(all[all.length-2].x, all[all.length-2].y);
      else for (let i=1;i<all.length-2;i++) catmullSeg(all[i-1],all[i],all[i+1],all[i+2]);
      ctx.stroke();
    }

    function beautifyAndDraw(pts) {
      if (pts.length < 2) return;
      const p0 = pts[0], pN = pts[pts.length-1];
      const arc = [0];
      for (let i=1;i<pts.length;i++) {
        const dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y;
        arc.push(arc[i-1]+Math.sqrt(dx*dx+dy*dy));
      }
      const total = arc[arc.length-1];
      if (total < 2) { ctx.beginPath(); ctx.arc(p0.x,p0.y,3,0,Math.PI*2); ctx.fillStyle='#4d90d6'; ctx.fill(); return; }
      const tArr = arc.map(l => l/total);
      const cdx=pN.x-p0.x, cdy=pN.y-p0.y, cLen=Math.sqrt(cdx*cdx+cdy*cdy);
      let maxDev=0;
      for (let j=1;j<pts.length-1;j++) {
        const ex=pts[j].x-p0.x, ey=pts[j].y-p0.y;
        const dev = cLen<1 ? Math.sqrt(ex*ex+ey*ey) : Math.abs(ex*cdy-ey*cdx)/cLen;
        if (dev>maxDev) maxDev=dev;
      }
      applyStyle();
      if (cLen<1 || maxDev/cLen<0.10) {
        ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(pN.x,pN.y); ctx.stroke(); return;
      }
      let sx=0,sy=0,sw=0;
      for (let k=1;k<pts.length-1;k++) {
        const ti=tArr[k], wi=2*ti*(1-ti);
        if (wi<1e-4) continue;
        sx+=wi*(pts[k].x-(1-ti)*(1-ti)*p0.x-ti*ti*pN.x);
        sy+=wi*(pts[k].y-(1-ti)*(1-ti)*p0.y-ti*ti*pN.y);
        sw+=wi*wi;
      }
      const P1 = sw<1e-6 ? {x:(p0.x+pN.x)/2,y:(p0.y+pN.y)/2} : {x:sx/sw,y:sy/sw};
      ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.quadraticCurveTo(P1.x,P1.y,pN.x,pN.y); ctx.stroke();
    }

    const onStart = e => { e.preventDefault(); isDrawing=true; rawPoints=[getCoords(e)]; };
    const onMove  = e => {
      if (!isDrawing) return; e.preventDefault();
      const c=getCoords(e), last=rawPoints[rawPoints.length-1];
      const dx=c.x-last.x, dy=c.y-last.y;
      if (dx*dx+dy*dy<4) return;
      rawPoints.push(c);
      restore(undoStack[undoStack.length-1]); applyStyle(); drawLivePreview(rawPoints);
    };
    const onEnd = () => {
      if (!isDrawing) return; isDrawing=false;
      restore(undoStack[undoStack.length-1]); beautifyAndDraw(rawPoints);
      undoStack.push(snap()); rawPoints=[];
    };

    canvas.addEventListener('mousedown',  onStart);
    canvas.addEventListener('mousemove',  onMove);
    canvas.addEventListener('mouseup',    onEnd);
    canvas.addEventListener('mouseleave', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive:false});
    canvas.addEventListener('touchmove',  onMove,  {passive:false});
    canvas.addEventListener('touchend',   onEnd);
    canvas.addEventListener('touchcancel',onEnd);

    undoBtn.addEventListener('click', () => {
      if (undoStack.length>1) { undoStack.pop(); restore(undoStack[undoStack.length-1]); }
    });

    clearBtn.addEventListener('click', doClearCanvas);

    window._clearCanvas = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      undoStack=[snap()]; rawPoints=[];
    };
  })();

  function doClearCanvas() { window._clearCanvas?.(); }

  // ════════════════════════════════════════════════════════════════
  //  SERVICE WORKER
  // ════════════════════════════════════════════════════════════════
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW registration failed:', e));
  }

  // ── INIT ──
  console.log('✅ Page loaded at:', new Date().toLocaleTimeString());
  renderHome();
  </script>
</body>
</html>
